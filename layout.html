<!DOCTYPE html>
<html lang="en">
<head>

{{HEAD_COMMON}}

<title>{{TITLE}}</title>
<meta name="description" content="{{DESCRIPTION}}">
<meta name="keywords" content="{{KEYWORDS}}">

{{HEAD_EXTRA}}

<link rel="stylesheet" href="/styles/main.css">
<style>
/* ================= ROOT VARIABLES ================= */
:root {
    --primary: #2563eb;
    --dark: #0f172a;
    --glass: rgba(15, 23, 42, 0.92);
    --text-light: #f8fafc;
}

/* ================= GLOBAL RESET ================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
}

/* ================= HEADER ================= */
header {
    position: sticky;
    top: 0;
    z-index: 9999;

    background: var(--dark);
    color: var(--text-light);

    display: flex;
    justify-content: space-between;
    align-items: center;

    padding: 15px 20px;
    max-width: 1200px;
    margin: auto;

    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}

/* ================= LOGO ================= */
.logo {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
}

.logo img {
    height: 40px;
    width: auto;
}

.header-title {
    font-size: 1.5rem;
    font-weight: 800;
    letter-spacing: -0.5px;
}

/* ================= NAV (DESKTOP) ================= */
nav {
    display: flex;
    align-items: center;
    gap: 25px;
}

nav a {
    color: var(--text-light);
    text-decoration: none;
    font-weight: 500;
    font-size: 0.95rem;
    transition: all 0.3s ease;
}

/* Hover + Active */
nav a:hover {
    color: var(--primary);
    transform: translateY(-1px);
}

nav a:active {
    opacity: 0.7;
}

/* Focus (Accessibility + SEO) */
nav a:focus {
    outline: 2px solid var(--primary);
    outline-offset: 3px;
}

/* ================= AUTH BUTTONS ================= */
.auth-links {
    display: flex;
    gap: 12px;
    margin-left: 15px;
}

.auth-links a {
    padding: 8px 16px;
    border-radius: 6px;
    font-weight: 600;
    transition: 0.3s ease;
}

/* Login */
.auth-links a:first-child {
    border: 1px solid var(--primary);
}

/* Signup */
.auth-links a:last-child {
    background: var(--primary);
}

/* ================= MOBILE ================= */
.menu-toggle {
    display: none;
    font-size: 26px;
    cursor: pointer;
}

/* ================= MOBILE NAV ================= */
@media (max-width: 992px) {

    .menu-toggle {
        display: block;
    }

    nav {
        position: fixed;
        top: 0;
        right: -100%;

        height: 100vh;
        width: 80%;
        max-width: 320px;

        background: var(--glass);
        backdrop-filter: blur(10px);

        flex-direction: column;
        align-items: flex-start;

        padding: 25px;

        transition: right 0.4s ease;
        box-shadow: -10px 0 30px rgba(0,0,0,0.5);
    }

    nav.active {
        right: 0;
    }

    /* Top section inside mobile menu */
    .mobile-top {
        display: flex;
        width: 100%;
        justify-content: space-between;
        align-items: center;

        margin-bottom: 30px;
        padding-bottom: 10px;

        border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .close-btn {
        font-size: 24px;
        cursor: pointer;
    }

    /* Nav links mobile spacing */
    nav a {
        width: 100%;
        padding: 10px 0;
        font-size: 1rem;
    }

    /* Auth buttons stack */
    .auth-links {
        flex-direction: column;
        width: 100%;
        margin-top: 20px;
        gap: 10px;
    }

    .auth-links a {
        text-align: center;
    }
}

/* ================= BODY LOCK (MENU OPEN) ================= */
body.menu-open {
    overflow: hidden;
}
 /* ===== FOOTER BASE ===== */
.footer {
    background: #0f172a; /* dark navy */
    color: #cbd5f5;
    padding: 60px 20px 20px;
    font-family: 'Poppins', sans-serif;
}

.footer-container {
    max-width: 1200px;
    margin: auto;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 40px;
}

/* ===== COLUMN ===== */
.footer-col h2,
.footer-col h3 {
    color: #ffffff;
    margin-bottom: 15px;
}

.footer-col p {
    font-size: 14px;
    line-height: 1.6;
}

/* ===== LOGO ===== */
.footer-logo {
    font-size: 24px;
    font-weight: 600;
}

.footer-logo span {
    color: #38bdf8; /* accent */
}

/* ===== LINKS ===== */
.footer-col ul {
    list-style: none;
    padding: 0;
}

.footer-col ul li {
    margin-bottom: 10px;
}

.footer-col ul li a {
    text-decoration: none;
    color: #cbd5f5;
    font-size: 14px;
    transition: 0.3s;
}

.footer-col ul li a:hover {
    color: #38bdf8;
    padding-left: 5px;
}

/* ===== BOTTOM ===== */
.footer-bottom {
    text-align: center;
    border-top: 1px solid #1e293b;
    margin-top: 40px;
    padding-top: 15px;
    font-size: 13px;
    color: #94a3b8;
}

/* ===== RESPONSIVE ===== */

/* Tablet */
@media (max-width: 900px) {
    .footer-container {
        grid-template-columns: repeat(2, 1fr);
        gap: 30px;
    }
}

/* Mobile */
@media (max-width: 600px) {
    .footer {
        padding: 40px 15px 15px;
    }

    .footer-container {
        grid-template-columns: 1fr;
        text-align: center;
    }

    .footer-col ul li a:hover {
        padding-left: 0;
    }
}
</style>
</head>
<body>

{{HEADER}}

{{CONTENT}}

{{FOOTER}}

<script src="/scripts/main.js"></script>
<script>
  
  if (localStorage.getItem('ignoreMe') !== 'true') {
    
    // Agar 'ignoreMe' nahi milta, tabhi Analytics load hoga
    var script = document.createElement('script');
    script.async = true;
    script.src = "https://www.googletagmanager.com/gtag/js?id=G-ZRZ11QPD5B";
    document.head.appendChild(script);

    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-ZRZ11QPD5B');
    
    console.log("Analytics is active for this session.");
  } else {
    // Agar 'ignoreMe' mil gaya, toh console mein message dikhega (sirf testing ke liye)
    console.log("Admin detected: Analytics is disabled.");
  }
    
document.addEventListener("DOMContentLoaded", function () {

    function toggleMenu() {
        const nav = document.getElementById('nav');
        nav.classList.toggle('active');

        document.body.classList.toggle('menu-open');
    }

    window.toggleMenu = toggleMenu; // IMPORTANT (global banana)

    document.querySelectorAll('#nav a').forEach(link => {
        link.addEventListener('click', () => {
            document.getElementById('nav').classList.remove('active');
            document.body.classList.remove('menu-open');
        });
    });

});
</script>
</body>
</html>
