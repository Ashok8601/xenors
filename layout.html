<!DOCTYPE html>
<html lang="en">
<head>

{{HEAD_COMMON}}

<title>{{TITLE}}</title>
<meta name="description" content="{{DESCRIPTION}}">
<meta name="keywords" content="{{KEYWORDS}}">

{{HEAD_EXTRA}}

<link rel="stylesheet" href="/styles/main.css">
<style>
  body {
    font-family: 'Inter', sans-serif;
    margin: 0;
    background: #f8fafc;
}

/* HEADER */
header {
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: space-between;
    padding: 15px 5%;
}

nav {
    display: flex;
    gap: 20px;
}

nav a {
    color: white;
    text-decoration: none;
}

/* MOBILE */
.menu-toggle {
    display: none;
    font-size: 24px;
}

@media (max-width: 768px) {
    .menu-toggle { display: block; }

    nav {
        position: fixed;
        right: -100%;
        top: 0;
        height: 100vh;
        width: 250px;
        background: #111;
        flex-direction: column;
        padding: 20px;
        transition: 0.3s;
    }

    nav.active {
        right: 0;
    }
}

/* HERO */
.hero {
    text-align: center;
    padding: 60px;
}

.btn {
    padding: 10px 20px;
    background: blue;
    color: white;
    text-decoration: none;
}

/* FOOTER */
.footer {
    background: #070b14;
    color: #aaa;
    padding: 40px;
}
</style>
</head>
<body>

{{HEADER}}

{{CONTENT}}

{{FOOTER}}

<script src="/scripts/main.js"></script>
<script>
  
  if (localStorage.getItem('ignoreMe') !== 'true') {
    
    // Agar 'ignoreMe' nahi milta, tabhi Analytics load hoga
    var script = document.createElement('script');
    script.async = true;
    script.src = "https://www.googletagmanager.com/gtag/js?id=G-ZRZ11QPD5B";
    document.head.appendChild(script);

    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-ZRZ11QPD5B');
    
    console.log("Analytics is active for this session.");
  } else {
    // Agar 'ignoreMe' mil gaya, toh console mein message dikhega (sirf testing ke liye)
    console.log("Admin detected: Analytics is disabled.");
  }
    
    function toggleMenu() {
        const nav = document.getElementById('nav');
        nav.classList.toggle('active');
        // Prevent scrolling when menu is open
        document.body.style.overflow = nav.classList.contains('active') ? 'hidden' : 'auto';
    }
    // Close menu when clicking links
    document.querySelectorAll('#nav a').forEach(link => {
        link.onclick = () => {
            document.getElementById('nav').classList.remove('active');
            document.body.style.overflow = 'auto';
        };
    });
</script>
</body>
</html>
