<!DOCTYPE html>
<html lang="en">
<head>
    <!-- COMMON HEAD -->
    {{HEAD_COMMON}}

    <!-- PAGE SEO -->
    <title>{{TITLE}}</title>
    <meta name="description" content="{{DESCRIPTION}}">
    <meta name="keywords" content="{{KEYWORDS}}">

    {{HEAD_EXTRA}}
    <style>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
        :root {
            --primary: #2563eb;
            --dark: #0f172a;
            --glass: rgba(15, 23, 42, 0.9);
            --text-light: #f8fafc;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        header {
            background: var(--dark);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            position: relative;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .logo { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .logo img { height: 40px; width: auto; }
        .header-title { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px; }

        /* Desktop Nav */
        nav { display: flex; align-items: center; gap: 25px; }
        nav a { color: white; text-decoration: none; font-weight: 500; font-size: 0.95rem; transition: 0.3s; }
        nav a:hover { color: var(--primary); }

        .auth-links { display: flex; gap: 15px; margin-left: 20px; }
        .auth-links a { padding: 8px 18px; border-radius: 6px; font-weight: 600; }
        .auth-links a:first-child { border: 1px solid var(--primary); }
        .auth-links a:last-child { background: var(--primary); }

        /* Mobile specific elements (hidden on desktop) */
        .menu-toggle { display: none; font-size: 28px; cursor: pointer; }
        .mobile-top { display: none; }

        @media (max-width: 992px) {
            .menu-toggle { display: block; }
            nav {
                position: fixed;
                top: 0;
                right: -100%; /* Hidden off-screen */
                height: 100vh;
                width: 300px;
                background: var(--glass);
                backdrop-filter: blur(10px);
                flex-direction: column;
                align-items: flex-start;
                padding: 30px;
                transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
                box-shadow: -10px 0 30px rgba(0,0,0,0.5);
            }
            nav.active { right: 0; }
            .mobile-top {
                display: flex;
                width: 100%;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 40px;
                border-bottom: 1px solid rgba(255,255,255,0.1);
                padding-bottom: 15px;
            }
            .close-btn { font-size: 24px; cursor: pointer; }
            .auth-links { flex-direction: column; width: 100%; margin-left: 0; margin-top: 20px; gap: 10px; }
            .auth-links a { text-align: center; }
        }



    .footer {
        background: #070b14;
        color: #94a3b8;
        padding: 80px 5% 30px;
        border-top: 1px solid #1e293b;
        margin-top: 100px;
    }
    .footer-container {
        max-width: 1200px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: 2fr 1fr 1fr;
        gap: 50px;
    }
    .footer-col h2 { color: white; font-size: 1.8rem; margin-bottom: 15px; }
    .footer-col h2 span { color: var(--primary); }
    .footer-col p { line-height: 1.6; font-size: 0.95rem; }
    .footer-col h3 { color: white; font-size: 1.1rem; margin-bottom: 25px; font-weight: 600; }
    .footer-col ul { list-style: none; }
    .footer-col ul li { margin-bottom: 12px; }
    .footer-col ul li a { color: #94a3b8; text-decoration: none; transition: 0.3s; font-size: 0.95rem; }
    .footer-col ul li a:hover { color: white; padding-left: 5px; }

    .footer-bottom {
        text-align: center;
        margin-top: 60px;
        padding-top: 30px;
        border-top: 1px solid #1e293b;
        font-size: 0.85rem;
    }

    @media (max-width: 768px) {
        .footer-container { grid-template-columns: 1fr; text-align: center; gap: 40px; }
        .footer-col ul li a:hover { padding-left: 0; color: var(--primary); }
    }
        </style>
    <script>
          
  if (localStorage.getItem('ignoreMe') !== 'true') {
    
    // Agar 'ignoreMe' nahi milta, tabhi Analytics load hoga
    var script = document.createElement('script');
    script.async = true;
    script.src = "https://www.googletagmanager.com/gtag/js?id=G-ZRZ11QPD5B";
    document.head.appendChild(script);

    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-ZRZ11QPD5B');
    
    console.log("Analytics is active for this session.");
  } else {
    // Agar 'ignoreMe' mil gaya, toh console mein message dikhega (sirf testing ke liye)
    console.log("Admin detected: Analytics is disabled.");
  }
    
    function toggleMenu() {
        const nav = document.getElementById('nav');
        nav.classList.toggle('active');
        // Prevent scrolling when menu is open
        document.body.style.overflow = nav.classList.contains('active') ? 'hidden' : 'auto';
    }
    // Close menu when clicking links
    document.querySelectorAll('#nav a').forEach(link => {
        link.onclick = () => {
            document.getElementById('nav').classList.remove('active');
            document.body.style.overflow = 'auto';
        };
    });
//updated
    </script>
</head>
<body>

    {{HEADER}}

    {{CONTENT}}

    {{FOOTER}}

</body>
</html>
