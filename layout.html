<!DOCTYPE html>
<html lang="en">
<head>

{{HEAD_COMMON}}

{{PAGE_HEAD}}  <!-- 🔥 Page specific head (title, meta, etc.) -->

<link rel="stylesheet" href="/styles/main.css">

<style>
/* ================= ROOT VARIABLES ================= */
:root {
    --primary: #2563eb;
    --dark: #0f172a;
    --glass: rgba(15, 23, 42, 0.92);
    --text-light: #f8fafc;
}

/* ================= GLOBAL RESET ================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    overflow-x: hidden;
}

body {
    font-family: 'Inter', sans-serif;
}

/* ================= HEADER ================= */
header {
    position: sticky;
    top: 0;
    z-index: 9999;
    background: var(--dark);
    color: var(--text-light);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
    max-width: 1200px;
    margin: auto;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}

/* ================= LOGO ================= */
.logo {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
}

.logo img {
    height: 40px;
}

/* ================= NAV ================= */
nav {
    display: flex;
    align-items: center;
    gap: 25px;
}

nav a {
    color: var(--text-light);
    text-decoration: none;
    font-weight: 500;
    font-size: 0.95rem;
}

/* ================= MOBILE ================= */
.menu-toggle {
    display: none;
    font-size: 26px;
    cursor: pointer;
}

@media (max-width: 992px) {

    .menu-toggle {
        display: block;
    }

    nav {
        position: fixed;
        top: 0;
        right: 0;
        height: 100vh;
        width: 80%;
        max-width: 320px;
        background: var(--glass);
        flex-direction: column;
        padding: 25px;
        transform: translateX(100%);
        transition: 0.3s;
    }

    nav.active {
        transform: translateX(0);
    }
}

/* ================= FOOTER ================= */
.footer {
    background: #0f172a;
    color: #cbd5f5;
    padding: 60px 20px 20px;
}

.footer-container {
    max-width: 1200px;
    margin: auto;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 40px;
}

.footer-bottom {
    text-align: center;
    margin-top: 30px;
    font-size: 13px;
}
</style>

</head>

<body>

{{HEADER}}

<main>
{{CONTENT}}
</main>

{{FOOTER}}

<script src="/scripts/main.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {

    function toggleMenu() {
        const nav = document.getElementById('nav');
        nav.classList.toggle('active');
        document.body.classList.toggle('menu-open');
    }

    window.toggleMenu = toggleMenu;

    document.querySelectorAll('#nav a').forEach(link => {
        link.addEventListener('click', () => {
            document.getElementById('nav').classList.remove('active');
            document.body.classList.remove('menu-open');
        });
    });

});
</script>

</body>
</html>
