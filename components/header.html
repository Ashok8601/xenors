<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --dark: #0f172a;
            --glass: rgba(15, 23, 42, 0.9);
            --text-light: #f8fafc;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        header {
            background: var(--dark);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .logo { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .logo img { height: 40px; width: auto; }
        .header-title { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px; }

        /* Desktop Nav */
        nav { display: flex; align-items: center; gap: 25px; }
        nav a { color: white; text-decoration: none; font-weight: 500; font-size: 0.95rem; transition: 0.3s; }
        nav a:hover { color: var(--primary); }

        .auth-links { display: flex; gap: 15px; margin-left: 20px; }
        .auth-links a { padding: 8px 18px; border-radius: 6px; font-weight: 600; }
        .auth-links a:first-child { border: 1px solid var(--primary); }
        .auth-links a:last-child { background: var(--primary); }

        /* Mobile specific elements (hidden on desktop) */
        .menu-toggle { display: none; font-size: 28px; cursor: pointer; }
        .mobile-top { display: none; }

        @media (max-width: 992px) {
            .menu-toggle { display: block; }
            nav {
                position: fixed;
                top: 0;
                right: -100%; /* Hidden off-screen */
                height: 100vh;
                width: 300px;
                background: var(--glass);
                backdrop-filter: blur(10px);
                flex-direction: column;
                align-items: flex-start;
                padding: 30px;
                transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
                box-shadow: -10px 0 30px rgba(0,0,0,0.5);
            }
            nav.active { right: 0; }
            .mobile-top {
                display: flex;
                width: 100%;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 40px;
                border-bottom: 1px solid rgba(255,255,255,0.1);
                padding-bottom: 15px;
            }
            .close-btn { font-size: 24px; cursor: pointer; }
            .auth-links { flex-direction: column; width: 100%; margin-left: 0; margin-top: 20px; gap: 10px; }
            .auth-links a { text-align: center; }
        }
    </style>
</head>
<body>
<header>
    <div class="logo" onclick="window.location.href='/'">
        <img src="/images/xenors.png" alt="Xenors logo">
        <h2 class="header-title">Xenors</h2>
    </div>

    <div class="menu-toggle" onclick="toggleMenu()">☰</div>

    <nav id="nav">
        <div class="mobile-top">
            <span class="brand" style="font-weight: 800; font-size: 1.2rem;">Xenors</span>
            <span class="close-btn" onclick="toggleMenu()">✖</span>
        </div>

        <a href="/">Home</a>
        <a href="/tech">Tech</a>
        <a href="/blog">Blogs</a>
        <a href="/finance">Finance</a>
        <a href="/about">About</a>
        <a href="/contact">Contact</a>

        <div class="auth-links">
            <a href="/login">Login</a>
            <a href="/signup">Signup</a>
        </div>
    </nav>
</header>

<script>
    function toggleMenu() {
        const nav = document.getElementById('nav');
        nav.classList.toggle('active');
        // Prevent scrolling when menu is open
        document.body.style.overflow = nav.classList.contains('active') ? 'hidden' : 'auto';
    }
    // Close menu when clicking links
    document.querySelectorAll('#nav a').forEach(link => {
        link.onclick = () => {
            document.getElementById('nav').classList.remove('active');
            document.body.style.overflow = 'auto';
        };
    });
</script>
