<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    
    <title>Create Your Xenors Account | Join the AI & Tech Revolution</title>
    <meta name="title" content="Sign Up | Xenors.in - Future of Tech & Finance">
    <meta name="description" content="Join Xenors.in today. Create a free account to access exclusive Machine Learning tutorials, Python development projects, and financial growth insights.">
    <meta name="robots" content="noindex, nofollow"> <meta name="theme-color" content="#1a1a1a">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://xenors.in/signup">
    <meta property="og:title" content="Join Xenors.in - Start Your Digital Journey">
    <meta property="og:description" content="Create an account to explore the intersection of Technology and Finance.">
    <meta property="og:image" content="https://xenors.in/images/xenors-auth-og.png">

    <link rel="icon" type="image/png" href="/images/xenors.png" sizes="32x32">
    <link rel="apple-touch-icon" href="/images/xenors.png">

    <link rel="stylesheet" href="styles/index.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <style>
        :root {
            --primary-blue: #007bff;
            --dark-bg: #111;
            --accent-glow: rgba(0, 123, 255, 0.4);
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at bottom left, #1e3a8a, #0a0a0a);
            font-family: 'Inter', sans-serif;
            color: white;
        }

        .signup-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .signup-card .logo-area img {
            width: 60px;
            margin-bottom: 20px;
        }

        .signup-card h2 {
            font-size: 2rem;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .signup-card p {
            color: #b0b0b0;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .input-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: #d1d1d1;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: white;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: var(--primary-blue);
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .signup-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            margin-top: 15px;
        }

        .signup-btn:hover {
            background: #0056b3;
            transform: translateY(-2px);
        }

        .signup-btn:active {
            transform: translateY(0);
        }

        .footer-links {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #888;
        }

        .footer-links a {
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 500;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        #status-msg {
            margin-top: 20px;
            font-size: 0.9rem;
            min-height: 20px;
        }

        /* Password strength indicator (Visual only) */
        .strength-bar {
            height: 4px;
            width: 100%;
            background: #333;
            margin-top: 8px;
            border-radius: 2px;
            overflow: hidden;
        }
    </style>
</head>
<body>

<div class="signup-card">
    <div class="logo-area">
        <img src="images/xenors.png" alt="Xenors Logo">
    </div>
    <h2>Join Xenors</h2>
    <p>Empower your journey in Tech & AI.</p>

    <div class="input-group">
        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" placeholder="Enter your full name" required>
    </div>

    <div class="input-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="name@example.com" required>
    </div>

    <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Create a strong password" required>
        <div class="strength-bar"></div>
    </div>

    <button class="signup-btn" id="signupBtn" onclick="signUp()">Create Account</button>

    <div id="status-msg"></div>

    <div class="footer-links">
        Already have an account? <a href="login.html">Sign In</a><br><br>
        By signing up, you agree to our <a href="/terms">Terms</a> & <a href="/privacy-policy">Privacy Policy</a>
    </div>
</div>

<script>
    // Supabase Configuration
    const supabaseClient = supabase.createClient(
        "https://fejvrvzllmvizdvnwopk.supabase.co",
        "sb_publishable_RIQQVfP2XVPV0woSF10isQ_kdvM21kV"
    );

    async function signUp() {
        const fullName = document.getElementById("fullName").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const statusMsg = document.getElementById("status-msg");
        const btn = document.getElementById("signupBtn");

        if (!fullName || !email || !password) {
            statusMsg.style.color = "#ff4d4d";
            statusMsg.innerText = "Please fill in all the details.";
            return;
        }

        if (password.length < 6) {
            statusMsg.style.color = "#ff4d4d";
            statusMsg.innerText = "Password must be at least 6 characters.";
            return;
        }

        // Loading state
        btn.innerText = "Creating Account...";
        btn.disabled = true;

        const { data, error } = await supabaseClient.auth.signUp({
            email: email,
            password: password,
            options: {
                data: {
                    full_name: fullName // Saving name in User Metadata
                }
            }
        });

        if (error) {
            statusMsg.style.color = "#ff4d4d";
            statusMsg.innerText = error.message;
            btn.innerText = "Create Account";
            btn.disabled = false;
        } else {
            statusMsg.style.color = "#00ff88";
            statusMsg.innerText = "Registration successful! Please check your email or Login.";
            
            setTimeout(() => {
                window.location.href = "login.html";
            }, 2000);
        }
    }
</script>

</body>
</html>
